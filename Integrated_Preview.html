<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영재컴퓨터 x 퀘이사존 통합 미리보기</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Malgun Gothic', 'Dotum', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .label {
            display: inline-block;
            background: #5f5f5f;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffad33;
        }

        hr {
            border: 0;
            border-top: 1px solid #444;
            margin: 20px 0;
        }

        /* iframe container */
        .widget-wrapper {
            width: 100%;
            max-width: 647px;
            /* 퀘이사존 규격 */
            margin: 0 auto;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
        }

        iframe {
            width: 100%;
            height: 1200px;
            /* 대략적인 높이 */
            border: none;
        }

        .quasazone-mockup {
            margin-top: 30px;
            border: 2px solid #ed1c24;
            padding: 15px;
            border-radius: 8px;
            position: relative;
        }

        .quasazone-mockup::before {
            content: "QUASARZONE REPLY AREA";
            position: absolute;
            top: -12px;
            left: 20px;
            background: #ed1c24;
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>

            <div class="widget-wrapper">
